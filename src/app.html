<!doctype html>
<html lang="en" data-theme="parchment-light">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Guild Book — a His Majesty the Worm adventurer creator and rules reference"
		/>

		<!-- Preload the body face (self-hosted from the Adherent of the Worm template). -->
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/imfell-english.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>

		<!-- Apply the saved theme before first paint to avoid a light→dark flash. -->
		<script>
			try {
				var t = localStorage.getItem('guildbook-theme');
				if (t === 'worm-dark' || t === 'parchment-light') {
					document.documentElement.setAttribute('data-theme', t);
				}
			} catch (e) {}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Original SVG grain filter used by the parchment theme (not book art). -->
		<svg style="position:absolute;width:0;height:0" aria-hidden="true">
			<filter id="paper-noise">
				<feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
				<feColorMatrix type="saturate" values="0" />
			</filter>
		</svg>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
